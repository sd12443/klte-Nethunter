name: Build NetHunter KLTE Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential bc bison flex \
          libssl-dev libelf-dev \
          libncurses5-dev wget xz-utils unzip

    # -----------------------------
    # DOWNLOAD TOOLCHAIN (FIXED)
    # -----------------------------
    - name: Download toolchain
      run: |
        mkdir -p $HOME/toolchain
        cd $HOME/toolchain

        echo "Downloading toolchain..."

        wget -L \
        https://github.com/sd12443/klte-Nethunter/releases/download/toolchain-v1/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06-build_2015_07_14.tar.xz \
        -O toolchain.tar.xz

        echo "Checking file type:"
        file toolchain.tar.xz

        # FAIL EARLY if wrong download
        file toolchain.tar.xz | grep "XZ compressed data"

        echo "Extracting..."
        tar -xJf toolchain.tar.xz

    # -----------------------------
    # SET ENVIRONMENT
    # -----------------------------
    - name: Setup toolchain
      run: |
        TOOLCHAIN=$(find $HOME/toolchain -type d -name "*linaro*" | head -n 1)

        echo "$TOOLCHAIN/bin" >> $GITHUB_PATH
        echo "ARCH=arm" >> $GITHUB_ENV
        echo "CROSS_COMPILE=arm-eabi-" >> $GITHUB_ENV

        arm-eabi-gcc --version || true

    # -----------------------------
    # CONFIGURE KERNEL
    # -----------------------------
    - name: Configure kernel
      run: |
        make O=out ARCH=$ARCH klte_eur_defconfig

    # -----------------------------
    # BUILD
    # -----------------------------
    - name: Build kernel
      run: |
        make O=out ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE -j$(nproc)

    # -----------------------------
    # UPLOAD RESULT
    # -----------------------------
    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: kernel-zimage
        path: out/arch/arm/boot/zImage
