name: Build NetHunter Kernel with RTL8821AU Support

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          wget \
          xz-utils \
          bc \
          libssl-dev \
          libncurses5-dev \
          bison \
          flex
    
    - name: Download and extract cross-compiler (Linaro 4.9.4)
      run: |
        mkdir -p /home/runner/build/toolchain
        cd /home/runner/build/toolchain
        echo "Downloading Linaro cross-compiler..."
        wget https://www.mediafire.com/file/9h19841nsm44z58/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06-build_2015_07_14.tar.xz/file -O compiler.tar.xz 2>&1 || \
        wget https://releases.linaro.org/components/toolchain/binaries/4.9-2015.06/arm-linux-gnueabihf/gcc-linaro-4.9-2015.06-x86_64_arm-linux-gnueabihf.tar.xz -O compiler.tar.xz
        echo "Extracting cross-compiler..."
        tar -xf compiler.tar.xz
        ls -la
    
    - name: Clone NetHunter Kernel (touchwiz-6.0)
      run: |
        cd ~
        git clone https://github.com/jcadduono/nethunter_kernel_klte.git -b touchwiz-6.0
        cd nethunter_kernel_klte
        echo "Kernel cloned successfully"
    
    - name: Configure build.sh and menuconfig.sh
      run: |
        cd ~/nethunter_kernel_klte
        # Edit build.sh (Ln54) - Set TOOLCHAIN path
        sed -i 's|TOOLCHAIN=.*|TOOLCHAIN=/home/runner/build/toolchain/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06|' build.sh
        # Edit build.sh (Ln69) - Set VARIANT=eur
        sed -i 's|VARIANT=.*|VARIANT=eur|' build.sh
        # Edit menuconfig.sh (Ln8) - Set TOOLCHAIN path
        sed -i 's|TOOLCHAIN=.*|TOOLCHAIN=$HOME/build/toolchain/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06|' menuconfig.sh
        
        echo "Configuration files updated"
        grep -n "TOOLCHAIN\|VARIANT" build.sh menuconfig.sh
    
    - name: Run menuconfig with developer's exact settings
      run: |
        cd ~/nethunter_kernel_klte
        export TOOLCHAIN=/home/runner/build/toolchain/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06
        export CROSS_COMPILE=$TOOLCHAIN/bin/arm-eabi-
        
        # Create a kernel config file with required settings
        make ARCH=arm CROSS_COMPILE=$CROSS_COMPILE mrproper
        make ARCH=arm CROSS_COMPILE=$CROSS_COMPILE defconfig
        
        # Enable loadable module support and wireless drivers
        ./scripts/config --enable MODULES
        ./scripts/config --enable MODULE_FORCE_LOAD
        ./scripts/config --enable MODULE_UNLOAD
        ./scripts/config --enable MODULE_FORCE_UNLOAD
        ./scripts/config --enable MODVERSIONS
        ./scripts/config --module WIRELESS
        ./scripts/config --module NET_RADIO
        ./scripts/config --module RTL8187
        ./scripts/config --module ATH_CARDS
        ./scripts/config --module ATH9K
        ./scripts/config --module ATH5K
        ./scripts/config --module AR5523
        ./scripts/config --module RALINK_DRIVER_SUPPORT
        ./scripts/config --module RT2500USB
        ./scripts/config --module RT73USB
        ./scripts/config --module RT2800USB
        ./scripts/config --module RTL8192CU
        ./scripts/config --module ZD1211RW
        
        echo "Kernel configuration completed"
    
    - name: Build NetHunter Kernel (./build.sh)
      run: |
        cd ~/nethunter_kernel_klte
        export TOOLCHAIN=/home/runner/build/toolchain/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06
        export VARIANT=eur
        
        echo "Building kernel with ./build.sh..."
        # Run the official build script
        bash build.sh
        
        # Verify zImage was created
        if [ -f arch/arm/boot/zImage ]; then
          echo "✓ Kernel zImage built successfully at arch/arm/boot/zImage"
          ls -lh arch/arm/boot/zImage
        else
          echo "✗ Kernel build failed - zImage not found"
          exit 1
        fi
    
    - name: Clone RTL8821AU driver
      run: |
        cd ~
        git clone https://github.com/ivanovborislav/rtl8821au.git
        cd rtl8821au
        echo "RTL8821AU driver cloned successfully"
    
    - name: Configure RTL8821AU Makefile (Developer's exact settings)
      run: |
        cd ~/rtl8821au
        
        # Edit Makefile (Ln142) - CONFIG_PLATFORM_I386_PC = y to CONFIG_PLATFORM_I386_PC = n
        sed -i 's/CONFIG_PLATFORM_I386_PC = y/CONFIG_PLATFORM_I386_PC = n/' Makefile
        
        # Add CONFIG_PLATFORM_ANDROID_ARM = y after CONFIG_PLATFORM_I386_PC = n
        if ! grep -q "CONFIG_PLATFORM_ANDROID_ARM = y" Makefile; then
          sed -i '/CONFIG_PLATFORM_I386_PC = n/a CONFIG_PLATFORM_ANDROID_ARM = y' Makefile
        fi
        
        # Add Android ARM build configuration before the endif (around Ln1350)
        if ! grep -q "ifeq (\$(CONFIG_PLATFORM_ANDROID_ARM), y)" Makefile; then
          cat >> Makefile << 'EOF'

ifeq ($(CONFIG_PLATFORM_ANDROID_ARM), y)
EXTRA_CFLAGS += -DCONFIG_LITTLE_ENDIAN
EXTRA_CFLAGS += -DCONFIG_IOCTL_CFG80211 -DRTW_USE_CFG80211_STA_EVENT
ARCH ?= arm
CROSS_COMPILE := /home/runner/build/toolchain/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06/bin/arm-eabi-
KVER ?= 3.4.0-nethunter-klte-eur-1.4
KSRC := /home/runner/nethunter_kernel_klte/build
MODDESTDIR := /lib/modules/$(KVER)/kernel/drivers/net/wireless/
INSTALL_PREFIX :=
endif
EOF
        fi
        
        echo "RTL8821AU Makefile configured"
        tail -20 Makefile
    
    - name: Build RTL8821AU kernel module
      run: |
        cd ~/rtl8821au
        export TOOLCHAIN=/home/runner/build/toolchain/arm-cortex_a15-linux-gnueabihf-linaro_4.9.4-2015.06
        export KVER="3.4.0-nethunter-klte-eur-1.4"
        export KSRC=/home/runner/nethunter_kernel_klte/build
        
        echo "Building RTL8821AU module with make..."
        make ARCH=arm CROSS_COMPILE=$TOOLCHAIN/bin/arm-eabi- KVER=$KVER KSRC=$KSRC -j$(nproc)
        
        if [ -f 8821au.ko ]; then
          echo "✓ RTL8821AU module built successfully"
          ls -lh 8821au.ko
        else
          echo "✗ RTL8821AU build failed"
          exit 1
        fi
    
    - name: Prepare artifacts (Developer's folder structure)
      run: |
        # Create folder structure: /modules/3.4.0-nethunter-klte-eur-1.4
        mkdir -p ~/build-artifacts/modules/3.4.0-nethunter-klte-eur-1.4
        
        # Copy zImage
        cp ~/nethunter_kernel_klte/arch/arm/boot/zImage ~/build-artifacts/
        echo "✓ Copied zImage"
        
        # Copy RTL8821AU module
        cp ~/rtl8821au/8821au.ko ~/build-artifacts/modules/3.4.0-nethunter-klte-eur-1.4/
        echo "✓ Copied 8821au.ko"
        
        # List artifacts
        echo "Build artifacts structure:"
        tree ~/build-artifacts/ || find ~/build-artifacts/ -type f
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Kernel-RTL8821AU-G900F
        path: ~/build-artifacts/
        retention-days: 30
    
    - name: Create deployment package
      run: |
        cd ~/build-artifacts
        # Create zip file ready to drag-drop into NetHunter image
        zip -r NetHunter-G900F-RTL8821AU.zip .
        ls -lh NetHunter-G900F-RTL8821AU.zip
    
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: NetHunter-Deployment-Package
        path: ~/build-artifacts/NetHunter-G900F-RTL8821AU.zip
        retention-days: 30
