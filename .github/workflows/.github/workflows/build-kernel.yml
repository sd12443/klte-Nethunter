# Build Workflow for Kernel

name: Build Kernel

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Download cross-compiler
      uses: actions/download-artifact@v2
      with:
        name: toolchain
        path: ./toolchain

    - name: Install Cross-Compiler
      run: |
        cd ./toolchain
        wget https://github.com/sd12443/klte-Nethunter/releases/download/toolchain-v1/toolchain.zip
        unzip toolchain.zip
        export PATH=$PATH:$(pwd)/bin

    - name: Build Kernel
      run: |
        make clean
        make O=out ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- -j$(nproc)
