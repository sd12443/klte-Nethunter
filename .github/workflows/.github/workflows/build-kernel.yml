name: Build NetHunter KLTE Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # -----------------------------------
    # Checkout repository
    # -----------------------------------
    - name: Checkout source
      uses: actions/checkout@v4

    # -----------------------------------
    # Install dependencies
    # -----------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential bc bison flex \
          libssl-dev libelf-dev \
          libncurses5-dev wget xz-utils unzip

    # -----------------------------------
    # Download OFFICIAL Linaro Toolchain
    # (stable — no MediaFire/GH release issues)
    # -----------------------------------
    - name: Download toolchain
      run: |
        mkdir -p $HOME/toolchain
        cd $HOME/toolchain

        echo "Downloading Linaro GCC 4.9 toolchain..."

        wget https://releases.linaro.org/components/toolchain/binaries/4.9-2015.06/arm-eabi/gcc-linaro-4.9-2015.06-x86_64_arm-eabi.tar.xz

        echo "Verify archive:"
        file gcc-linaro-4.9-2015.06-x86_64_arm-eabi.tar.xz

        echo "Extracting..."
        tar -xJf gcc-linaro-4.9-2015.06-x86_64_arm-eabi.tar.xz

    # -----------------------------------
    # Setup environment (PERSISTENT)
    # -----------------------------------
    - name: Setup toolchain environment
      run: |
        echo "$HOME/toolchain/gcc-linaro-4.9-2015.06-x86_64_arm-eabi/bin" >> $GITHUB_PATH
        echo "ARCH=arm" >> $GITHUB_ENV
        echo "CROSS_COMPILE=arm-eabi-" >> $GITHUB_ENV

        arm-eabi-gcc --version

    # -----------------------------------
    # Clean previous builds
    # -----------------------------------
    - name: Clean build
      run: |
        make clean || true
        rm -rf out

    # -----------------------------------
    # Configure kernel
    # -----------------------------------
    - name: Configure kernel
      run: |
        make O=out ARCH=$ARCH klte_eur_defconfig

    # -----------------------------------
    # Build kernel
    # -----------------------------------
    - name: Build kernel
      run: |
        make O=out \
        ARCH=$ARCH \
        CROSS_COMPILE=$CROSS_COMPILE \
        -j$(nproc)

    # -----------------------------------
    # Upload result
    # -----------------------------------
    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: kernel-zimage
        path: out/arch/arm/boot/zImage
